<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理ボード</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    :root {
      --mint:      #3ecfaa;
      --mint-dark: #29a98b;
      --mint-light:#e6faf5;
      --mint-mid:  #b2edd9;
      --text:      #1a3a32;
      --text-sub:  #6b9e8e;
      --bg:        #f0faf7;
      --card:      #ffffff;
      --border:    #d0ede5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      padding: 48px 20px;
    }

    /* ヘッダー */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--text-sub);
    }

    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    /* 入力エリア */
    .input-area {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-bottom: 20px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(62,207,170,0.08);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-area:focus-within {
      border-color: var(--mint);
      box-shadow: 0 2px 16px rgba(62,207,170,0.18);
    }

    .input-row {
      display: flex;
      align-items: center;
      padding: 4px 8px 4px 16px;
      gap: 8px;
    }

    .input-row + .input-row {
      border-top: 1px solid var(--border);
      padding: 8px 8px 8px 16px;
    }

    .input-area input[type="text"] {
      flex: 1;
      font-size: 15px;
      font-family: inherit;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      padding: 8px 0;
    }

    .input-area input[type="text"]::placeholder {
      color: var(--text-sub);
    }

    .date-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      white-space: nowrap;
    }

    .input-area input[type="date"] {
      font-size: 13px;
      font-family: inherit;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
    }

    .input-area button {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      background: var(--mint);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    .input-area button:hover  { background: var(--mint-dark); }
    .input-area button:active { transform: scale(0.97); }

    /* フィルター */
    .filter-area {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
    }

    .filter-area button {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      background: var(--card);
      color: var(--text-sub);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-area button:hover {
      border-color: var(--mint);
      color: var(--mint-dark);
    }

    .filter-area button.active {
      background: var(--mint);
      border-color: var(--mint);
      color: white;
    }

    /* タスクリスト */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .task-item {
      background: var(--card);
      border: 1.5px solid var(--border);
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow 0.15s, border-color 0.15s, opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    .task-item:hover {
      box-shadow: 0 4px 16px rgba(62,207,170,0.12);
      border-color: var(--mint-mid);
    }

    /* カスタムチェックボックス */
    .task-item input[type="checkbox"] {
      appearance: none;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      border: 2px solid var(--mint-mid);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      background: white;
    }

    .task-item input[type="checkbox"]:hover {
      border-color: var(--mint);
    }

    .task-item input[type="checkbox"]:checked {
      background: var(--mint);
      border-color: var(--mint);
    }

    .task-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .task-item .task-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .task-item .task-text {
      line-height: 1.5;
      transition: color 0.2s;
    }

    .due-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      width: fit-content;
    }

    .due-badge.future  { background: var(--mint-light); color: var(--mint-dark); }
    .due-badge.soon    { background: #fff7e6; color: #b45309; }
    .due-badge.today   { background: #fff3e0; color: #c2410c; }
    .due-badge.overdue { background: #fef2f2; color: #b91c1c; }

    .task-item.done {
      opacity: 0.6;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--text-sub);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 48px 0;
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
      color: var(--text-sub);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>タスク管理ボード</h1>
    </div>

    <div class="input-area">
      <div class="input-row">
        <input type="text" id="taskInput" placeholder="タスクを入力..." />
        <button id="addBtn">追加</button>
      </div>
      <div class="input-row">
        <span class="date-label">期限</span>
        <input type="date" id="dueDateInput" />
      </div>
    </div>

    <div class="filter-area">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="active">未完了</button>
      <button data-filter="done">完了</button>
    </div>

    <div class="task-list" id="taskList">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✅</div>
        <p>タスクはまだありません</p>
      </div>
    </div>
  </div>

  <script>
    const input        = document.getElementById('taskInput');
    const dueDateInput = document.getElementById('dueDateInput');
    const addBtn       = document.getElementById('addBtn');
    const taskList     = document.getElementById('taskList');
    const emptyState   = document.getElementById('emptyState');
    let currentFilter  = 'all';

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function dueBadge(dateStr) {
      if (!dateStr) return null;

      const t = today();
      const diffDays = Math.round((new Date(dateStr) - new Date(t)) / 86400000);

      let cls, label;
      if (diffDays < 0)       { cls = 'overdue'; label = `期限切れ (${dateStr})`; }
      else if (diffDays === 0){ cls = 'today';   label = `今日まで`; }
      else if (diffDays <= 3) { cls = 'soon';    label = `あと${diffDays}日 (${dateStr})`; }
      else                    { cls = 'future';  label = `${dateStr} まで`; }

      const badge = document.createElement('span');
      badge.className = `due-badge ${cls}`;
      badge.textContent = label;
      return badge;
    }

    function saveTasks() {
      const items = taskList.querySelectorAll('.task-item');
      const data = [...items].map(item => ({
        text: item.querySelector('.task-text').textContent,
        due:  item.dataset.due || '',
        done: item.classList.contains('done'),
      }));
      localStorage.setItem('tasks', JSON.stringify(data));
    }

    function applyFilter() {
      const items = taskList.querySelectorAll('.task-item');
      items.forEach(item => {
        const isDone = item.classList.contains('done');
        const visible =
          currentFilter === 'all' ||
          (currentFilter === 'done'   && isDone) ||
          (currentFilter === 'active' && !isDone);
        item.style.display = visible ? 'flex' : 'none';
      });

      const anyVisible = [...items].some(i => i.style.display !== 'none');
      emptyState.style.display      = (items.length === 0 || !anyVisible) ? 'flex' : 'none';
      emptyState.style.flexDirection = 'column';
      emptyState.style.alignItems    = 'center';
    }

    function createTaskItem(text, due = '', done = false) {
      const item = document.createElement('div');
      item.className = 'task-item' + (done ? ' done' : '');
      item.dataset.due = due;

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = done;
      checkbox.addEventListener('change', () => {
        item.classList.toggle('done', checkbox.checked);
        saveTasks();
        applyFilter();
      });

      const body = document.createElement('div');
      body.className = 'task-body';

      const label = document.createElement('span');
      label.className = 'task-text';
      label.textContent = text;
      body.appendChild(label);

      const badge = dueBadge(due);
      if (badge) body.appendChild(badge);

      item.appendChild(checkbox);
      item.appendChild(body);
      return item;
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const item = createTaskItem(text, dueDateInput.value, false);
      taskList.appendChild(item);

      input.value = '';
      dueDateInput.value = '';
      input.focus();
      saveTasks();
      applyFilter();
    }

    function loadTasks() {
      const data = JSON.parse(localStorage.getItem('tasks') || '[]');
      data.forEach(({ text, due, done }) => {
        taskList.appendChild(createTaskItem(text, due || '', done));
      });
      applyFilter();
    }

    addBtn.addEventListener('click', addTask);

    document.querySelectorAll('.filter-area button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-area button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    loadTasks();
  </script>
</body>
</html>
